<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<p>Right-click each canvas and "Save image as" with the filename shown.</p>
<script>
const sizes = [16, 32, 48, 128];
sizes.forEach(size => {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Background circle
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#4f6fd4');
  grad.addColorStop(1, '#6c8bef');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(size/2, size/2, size/2, 0, Math.PI * 2);
  ctx.fill();

  // Checkmark
  ctx.strokeStyle = 'white';
  ctx.lineWidth = size * 0.12;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(size * 0.25, size * 0.5);
  ctx.lineTo(size * 0.42, size * 0.67);
  ctx.lineTo(size * 0.72, size * 0.33);
  ctx.stroke();

  canvas.style.margin = '8px';
  canvas.title = `icon${size}.png`;
  const label = document.createElement('p');
  label.textContent = `Save as: icon${size}.png`;
  document.body.appendChild(label);
  document.body.appendChild(canvas);

  // Auto-download
  canvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `icon${size}.png`;
    a.click();
  });
});
</script>
</body>
</html>
